# /etc/nginx/sites-available/mp.solutionbox.cz  (symlink into sites-enabled, then `nginx -t && systemctl reload nginx`)
# Terminates TLS for the apex + every tenant subdomain and proxies ONLY to the Next.js BFF on 127.0.0.1:16013.
# The .NET Api is never reached by nginx — the BFF proxies /api/bff/* -> /v1 server-side.

server {
    listen 80;
    listen [::]:80;
    server_name mp.solutionbox.cz *.mp.solutionbox.cz;
    # ACME http-01 not used (wildcard needs dns-01); just redirect everything to https.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mp.solutionbox.cz *.mp.solutionbox.cz;

    # Wildcard cert issued via certbot dns-01 (see certbot-hetzner-*.sh). Covers apex + *.mp.
    ssl_certificate     /etc/letsencrypt/live/mp.solutionbox.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mp.solutionbox.cz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # File upload cap matches the BFF/Files policy (10 MB + overhead).
    client_max_body_size 11M;

    # Real client IP + scheme + Host (Host drives tenant classification in proxy.ts).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # SSE realtime stream — MUST NOT buffer, long-lived.
    location /api/bff/realtime/stream {
        proxy_pass http://127.0.0.1:16013;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:16013;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
